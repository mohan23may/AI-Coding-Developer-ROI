name: Sync model rates

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Only one sync runs at a time; a second trigger queues instead of racing.
concurrency:
  group: rate-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Sync rates
        run: node scripts/sync-rates.mjs
      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain public/rates.json)" ]]; then
            echo "No rate changes today."
            exit 0
          fi
          git config user.name "rate-sync-bot"
          git config user.email "actions@github.com"
          git add public/rates.json
          git commit -m "chore: sync model rates $(date -u +%Y-%m-%d)"
          # If the remote advanced during this run, rebase on top, then push.
          # Retry a few times to absorb any concurrent update.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
              && git push && { echo "Pushed on attempt $attempt"; exit 0; }
            echo "Push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "Push failed after 3 attempts."
          exit 1
