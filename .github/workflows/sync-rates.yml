name: Sync model rates

# Refreshes public/rates.json from the pricing registry every day at 06:00 UTC.
# Each price change lands as its own commit, giving the app an auditable price
# history. Manual runs allowed via the Actions tab.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync rates
        run: node scripts/sync-rates.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/rates.json)" ]]; then
            git config user.name "rate-sync-bot"
            git config user.email "actions@github.com"
            git add public/rates.json
            git commit -m "chore: sync model rates $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No rate changes today."
          fi
